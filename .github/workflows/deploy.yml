on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4.2.2

      # Configurar Node.js para frontend y backend
      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '18'

      # Instalar dependencias y construir frontend y backend
      - name: Instalar dependencias y build
        run: |
          cd backend/ && npm install && npm run build
          cd ../frontend/ && npm install && npm run build

      # Docker Login
      - name: Docker Login
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Construcción y subida de imágenes a Docker Hub
      - name: Build y push de imágenes
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mi-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mi-frontend:${{ github.sha }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mi-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mi-backend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4.2.2

      # Descargar el archivo vars.yml para Ansible
      - name: Crear archivo vars.yml para Ansible
        run: |
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > ansible/vars.yml
          echo "DOCKER_IMAGE_TAG=${{ github.sha }}" >> ansible/vars.yml

      # Configurar Ansible
      - name: Instalar Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # Crear el archivo .env en backend con GitHub Secrets
      - name: Crear .env en backend
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > backend/.env

      # Crear la clave SSH privada y configurarla
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_rsa

      - name: Crear archivo de inventario para Ansible
        run: |
          echo "[web]" > ansible/inventory
          echo "ec2-instance ansible_host=${{ secrets.EC2_PUBLIC_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa" >> ansible/inventory
          echo "[all:vars]" >> ansible/inventory
          echo "ansible_python_interpreter=/usr/bin/python3" >> ansible/inventory

      # Ejecutar playbook de Ansible
      - name: Ejecutar Ansible Playbook
        run: |
          cd ansible
          ansible-playbook -i inventory playbook.yml --extra-vars "@vars.yml" --private-key ~/.ssh/id_rsa
